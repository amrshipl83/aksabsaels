name: aksab_sales
description: "A specialized Flutter application for Sales Representatives and Managers."
publish_to: 'none'
# الإصدار 8 لتخطي أي مسودات سابقة في المتجر
version: 1.0.1+8

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase - القلب المحرك لإدارة البيانات
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2
  firebase_messaging: ^15.0.3

  # UI & Professional Design
  sizer: ^3.1.3
  font_awesome_flutter: ^10.7.0
  intl: ^0.20.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  lucide_icons: ^0.257.0

  # Google Maps & Location (لإدارة المناطق والمناديب)
  google_maps_flutter: ^2.17.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  url_launcher: ^6.3.2
  # لإبقاء المدير/المشرف على اتصال بالبيانات الحية
  flutter_background_service: ^5.1.0

  # Business & Analytics Tools
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  permission_handler: ^12.0.1
  share_plus: ^10.1.4
  path_provider: ^2.1.3
  http: ^1.6.0
  fl_chart: ^1.1.1  # مهم جداً لرسم بياني للمبيعات (Sales Analytics)
  pdf: ^3.11.3      # لإصدار تقارير مبيعات وفواتير
  printing: ^5.14.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# أيقونة تطبيق المبيعات (تأكد من وجود الملف في assets)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    # ملف حدود الإسكندرية لاستخدامه في لوحة تحكم المشرف والمدير
    - assets/OSMB-bc319d822a17aa9ad1089fc05e7d4e752460f877.geojson

