name: Build Flutter APK (Release)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout الكود
      - name: 🧩 Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: ☕️ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3️⃣ Setup Flutter
      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 4️⃣ Install dependencies
      - name: 📦 Install Dependencies
        run: flutter pub get

      # 5️⃣ Decode release keystore من secret
      - name: 🔑 Decode release.keystore from base64
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Warning: RELEASE_KEYSTORE_BASE64 is empty. Build might fail if signing is required."
          else
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > android/release.keystore
          fi

      # 6️⃣ Build Release APK
      - name: 🏗️ Build Release APK
        run: flutter build apk --release

      # 7️⃣ تم إيقاف الـ AAB مؤقتاً لتسريع الـ Build
      # - name: 📦 Build Release AAB
      #   run: flutter build appbundle --release

      # 8️⃣ Upload Artifacts (APK Only)
      - name: 📤 Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aksab-sales-apk
          path: build/app/outputs/flutter-apk/app-release.apk
