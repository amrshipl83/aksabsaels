name: Build Flutter APK (Release)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout الكود
      - name: 🧩 Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java (تم اختيار Zulu 17 لتوافقها العالي مع أندرويد)
      - name: ☕️ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3️⃣ Setup Flutter
      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 4️⃣ Install dependencies
      - name: 📦 Install Dependencies
        run: flutter pub get

      # 5️⃣ فك تشفير المفتاح وإنشاء ملف الخصائص
      # ملاحظة: تأكد من تسمية السيكرت في GitHub بـ RELEASE_KEYSTORE_BASE64
      - name: 🔑 Setup Code Signing
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # فك تشفير ملف الـ JKS ووضعه في مساره الصحيح
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/aksabsales.jks
          
          # إنشاء ملف key.properties اللي الـ Gradle بيدور عليه
          echo "storePassword=$STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=aksabsales.jks" >> android/key.properties

      # 6️⃣ Build Release APK
      - name: 🏗️ Build Release APK
        run: flutter build apk --release

      # 7️⃣ Upload Artifacts (APK Only)
      - name: 📤 Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aksab-sales-apk
          path: build/app/outputs/flutter-apk/app-release.apk
